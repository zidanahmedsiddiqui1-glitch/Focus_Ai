<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner - Focus AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #000;
        }
    </style>
</head>

<body class="bg-black text-white">
    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-zinc-950/80 backdrop-blur-lg border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="text-white">
                        <path
                            d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" />
                        <path d="M9 13a4.5 4.5 0 0 0 3-4" />
                        <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5" />
                        <path d="M3.477 10.896a4 4 0 0 1 .585-.396" />
                        <path d="M6 18a4 4 0 0 1-1.967-.516" />
                        <path d="M12 13h4" />
                        <path d="M12 18h6a2 2 0 0 1 2 2v1" />
                        <path d="M12 8h8" />
                        <path d="M16 8V5a2 2 0 0 1 2-2" />
                        <circle cx="16" cy="13" r=".5" />
                        <circle cx="18" cy="3" r=".5" />
                        <circle cx="20" cy="21" r=".5" />
                        <circle cx="20" cy="8" r=".5" />
                    </svg>
                </div>
                <span class="text-lg font-semibold text-white">Focus AI</span>
            </a>

            <div class="flex items-center gap-1">
                <a href="/"
                    class="nav-link px-4 py-2 rounded-lg transition-all text-zinc-400 hover:text-white hover:bg-white/5">
                    Dashboard
                </a>
                <a href="/planner-page"
                    class="nav-link px-4 py-2 rounded-lg transition-all bg-white/10 text-white">
                    Study Planner
                </a>
                <a href="/chat-page"
                    class="nav-link px-4 py-2 rounded-lg transition-all text-zinc-400 hover:text-white hover:bg-white/5">
                    AI Chat
                </a>
            </div>
        </div>
    </nav>

    <!-- Study Planner Section -->
    <section id="study-planner" class="min-h-screen bg-black pt-24 pb-12 px-6">
        <div class="max-w-4xl mx-auto">
            <!-- Header -->
            <div class="mb-8">
                <div class="flex items-center gap-3 mb-2">
                    <div
                        class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="text-white">
                            <path
                                d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z" />
                        </svg>
                    </div>
                    <h1 class="text-4xl text-white font-semibold">Study Plan Generator</h1>
                </div>
                <p class="text-zinc-400">Create a personalized study schedule for your upcoming exam</p>
            </div>

            <!-- Form Card -->
            <div class="rounded-2xl bg-white/5 backdrop-blur-xl border border-white/10 p-8 mb-8">
                <form id="studyPlanForm" class="space-y-6">
                    <div>
                        <label class="block text-white mb-2">
                            <div class="flex items-center gap-2 mb-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" />
                                </svg>
                                Subject
                            </div>
                        </label>
                        <input type="text" id="subject" name="subject"
                            placeholder="e.g., Mathematics, Physics, Chemistry" required
                            class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>

                    <div>
                        <label class="block text-white mb-2">
                            <div class="flex items-center gap-2 mb-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
                                    <line x1="16" x2="16" y1="2" y2="6" />
                                    <line x1="8" x2="8" y1="2" y2="6" />
                                    <line x1="3" x2="21" y1="10" y2="10" />
                                </svg>
                                Exam Date
                            </div>
                        </label>
                        <input type="date" id="exam_date" name="exam_date" required
                            class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>

                    <div>
                        <label class="block text-white mb-2">
                            <div class="flex items-center gap-2 mb-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10" />
                                    <polyline points="12 6 12 12 16 14" />
                                </svg>
                                Study Hours Per Day
                            </div>
                        </label>
                        <input type="number" id="hours" name="hours" placeholder="e.g., 2, 3, 4" min="1" max="12"
                            required
                            class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>

                    <button type="submit"
                        class="w-full px-6 py-4 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-medium hover:from-indigo-600 hover:to-purple-700 transition-all flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z" />
                        </svg>
                        Generate Study Plan
                    </button>
                </form>
            </div>

            <!-- Generated Plan -->
            <div id="generatedPlan" style="display: none;"
                class="rounded-2xl bg-white/5 backdrop-blur-xl border border-white/10 p-8">
                <div class="mb-6">
                    <h2 class="text-2xl text-white mb-2 font-semibold">Your Study Plan</h2>
                    <div id="planSummary" class="flex items-center gap-4 text-sm text-zinc-400"></div>
                </div>

                <div id="planSchedule" class="space-y-3"></div>
            </div>
        </div>
    </section>

    <script>
        // Study Plan Form
        document.getElementById('studyPlanForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const subject = document.getElementById('subject').value;
            const examDate = document.getElementById('exam_date').value;
            const hours = document.getElementById('hours').value;

            // Calculate days until exam
            const today = new Date();
            const exam = new Date(examDate);
            const daysUntilExam = Math.ceil((exam - today) / (1000 * 60 * 60 * 24));
            const totalHours = daysUntilExam * parseInt(hours);

            // Generate plan
            const planSummary = document.getElementById('planSummary');
            planSummary.innerHTML = `
                <span>Subject: ${subject}</span>
                <span>•</span>
                <span>${daysUntilExam} days</span>
                <span>•</span>
                <span>${totalHours} total hours</span>
            `;

            const planSchedule = document.getElementById('planSchedule');
            planSchedule.innerHTML = '';

            const numDays = Math.min(daysUntilExam, 7);
            for (let i = 0; i < numDays; i++) {
                const dayCard = `
                    <div class="rounded-xl bg-white/5 border border-white/10 p-4 hover:bg-white/10 transition-all">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                                    <span class="text-white font-medium">D${i + 1}</span>
                                </div>
                                <div>
                                    <p class="text-white">${subject} - Topic ${i + 1}</p>
                                    <p class="text-zinc-500 text-sm">${hours} hours</p>
                                </div>
                            </div>
                            <div class="w-6 h-6 rounded-full border-2 border-white/20"></div>
                        </div>
                    </div>
                `;
                planSchedule.innerHTML += dayCard;
            }

            document.getElementById('generatedPlan').style.display = 'block';
        });
    </script>
</body>

</html>
